name: Deploy API

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.CLOUD_RUN_REGION || 'asia-northeast1' }}
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE || 'coyo-api' }}
  IMAGE_NAME: coyo-api

jobs:
  changes:
    name: Detect backend changes
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/api/**'
              - 'docker-compose.yml'
              - '.github/workflows/deploy-api.yml'

  deploy:
    name: Build & Deploy to Cloud Run
    needs: changes
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation (no service account keys)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # Configure Docker for Artifact Registry
      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # Build and push Docker image
      - name: Build and push
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/coyo/${IMAGE_NAME}:${GITHUB_SHA::8}"
          docker build -t "${IMAGE}" -f apps/api/Dockerfile apps/api/
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      # Run database migrations
      - name: Run migrations
        run: |
          pip install -e "apps/api"
          cd apps/api && alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: "redis://localhost:6379"
          OPENAI_API_KEY: "sk-dummy-for-migrations"

      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.IMAGE }}
          region: ${{ env.REGION }}
          flags: >-
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --timeout=300
            --concurrency=80
            --execution-environment=gen2
            --no-cpu-throttling
            --allow-unauthenticated
          env_vars: |
            ENVIRONMENT=production
            GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME || 'coyo-audio-prod' }}
            RATE_LIMIT_PER_MINUTE=30
            CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS || '[]' }}
          secrets: |
            DATABASE_URL=database-url:latest
            REDIS_URL=redis-url:latest
            OPENAI_API_KEY=openai-api-key:latest

      # Verify deployment
      - name: Health check
        run: |
          URL=$(gcloud run services describe ${SERVICE_NAME} --region ${REGION} --format 'value(status.url)')
          echo "Service URL: ${URL}"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=${STATUS}, retrying..."
            sleep 5
          done
          echo "Health check failed"
          exit 1
