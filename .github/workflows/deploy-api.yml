name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.CLOUD_RUN_REGION }}
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}
  IMAGE_NAME: coyo-api

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Authenticate to GCP via Workload Identity Federation (no service account keys)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # Configure Docker for Artifact Registry
      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # Build and push Docker image
      - name: Build and push
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${{ vars.ARTIFACT_REPO }}/${IMAGE_NAME}:${GITHUB_SHA::8}"
          docker build -t "${IMAGE}" -f apps/api/Dockerfile apps/api/
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      # Run database migrations
      - name: Check pending migrations
        id: migration-check
        run: |
          pip install -e "apps/api"
          cd apps/api
          if alembic check 2>&1 | grep -q "No new upgrade operations detected"; then
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "No pending migrations"
          else
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "Pending migrations detected"
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: "memory://"
          OPENAI_API_KEY: "dummy"

      - name: Run migrations
        if: steps.migration-check.outputs.has_pending == 'true'
        run: cd apps/api && alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: "memory://"
          OPENAI_API_KEY: "dummy"

      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.IMAGE }}
          region: ${{ env.REGION }}
          flags: >-
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --timeout=300
            --concurrency=80
            --execution-environment=gen2
            --no-cpu-throttling
            --allow-unauthenticated
          env_vars: |
            ENVIRONMENT=production
            GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }}
            RATE_LIMIT_PER_MINUTE=30
            CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS || '[]' }}
            FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}
          secrets: |
            DATABASE_URL=database-url:latest
            REDIS_URL=redis-url:latest
            OPENAI_API_KEY=openai-api-key:latest

      # Verify deployment
      - name: Health check
        run: |
          URL=$(gcloud run services describe ${SERVICE_NAME} --region ${REGION} --format 'value(status.url)')
          echo "Service URL: ${URL}"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=${STATUS}, retrying..."
            sleep 5
          done
          echo "Health check failed"
          exit 1
