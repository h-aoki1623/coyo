# home-topic-cards.yaml
# Verifies all 5 topic cards are visible on the Home screen and the
# history button is accessible. Does NOT tap any cards.
#
# Expected result: All topic cards and the history button are rendered.
# Note: Uses testID-based selectors (`id`) because Maestro's text matching
# cannot reliably find text inside FlatList items on iOS.
appId: com.coto.app
---
# Launch the application (clearState: false to preserve expo-dev-client settings)
- launchApp:
    clearState: false

# Wait for the Home screen to fully render.
# On Android emulators, the Expo dev client cold start can be slow.
- extendedWaitUntil:
    visible:
      id: "topic-sports"
    timeout: 30000

# Verify all 5 topic cards are visible via testID
- assertVisible:
    id: "topic-sports"
- assertVisible:
    id: "topic-business"
- assertVisible:
    id: "topic-politics"
- assertVisible:
    id: "topic-technology"
- assertVisible:
    id: "topic-entertainment"

# Verify the history button is present via testID
- assertVisible:
    id: "history-button"

# Verify the TOPICS section label
- assertVisible: "TOPICS"

# Capture evidence of all topic cards
- takeScreenshot: "home-topic-cards-all"
