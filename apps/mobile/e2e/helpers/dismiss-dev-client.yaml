# dismiss-dev-client.yaml
# Helper flow: dismisses the expo-dev-client onboarding dialog.
#
# Called by run-e2e.sh before running actual test flows.
# The dialog only appears once per app install (persisted in shared preferences).
# If the dialog is not visible, the conditional block is simply skipped.
#
# This file is NOT listed in config.yaml and is NOT a test flow.
appId: to.coyo.app
---
- launchApp:
    clearState: false

# Wait for the app to finish loading.
# With auth gate, the Welcome screen appears for unauthenticated users.
- extendedWaitUntil:
    visible:
      id: "welcome-get-started"
    timeout: 30000

# Dismiss dev client dialog if it appears on top
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
